name: Release

on:
  push:
    branches: [master]
    paths:
      - build.gradle.kts
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    # macOS is the only host that can build every target. With the cinterop headers fetched
    # below and kotlin.native.enableKlibsCrossCompilation, it cross-compiles the linuxX64 and
    # mingwX64 klibs alongside the native Apple targets, so one deployment carries all of them.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch libpcap headers
        run: |
          curl -sSL https://www.tcpdump.org/release/libpcap-1.10.5.tar.gz -o libpcap.tar.gz
          mkdir -p libpcap-src src/nativeInterop/pcap-headers
          tar -xzf libpcap.tar.gz -C libpcap-src --strip-components=1
          cp libpcap-src/pcap.h src/nativeInterop/pcap-headers/
          cp -R libpcap-src/pcap src/nativeInterop/pcap-headers/pcap

      - name: Fetch Npcap SDK
        run: |
          curl -sSL https://npcap.com/dist/npcap-sdk-1.13.zip -o npcap-sdk.zip
          mkdir -p src/nativeInterop/npcap-sdk
          unzip -q npcap-sdk.zip -d src/nativeInterop/npcap-sdk

      - uses: jokelbaf/kotlin-release@master
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_password: ${{ secrets.GPG_PASSWORD }}
          maven_username: ${{ secrets.MAVEN_USERNAME }}
          maven_password: ${{ secrets.MAVEN_PASSWORD }}
          java_version: 25
