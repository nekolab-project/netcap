name: Release

on:
  push:
    branches: [master]
    paths:
      - build.gradle.kts
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    # macOS is the only host that can build every target. With the cinterop headers fetched
    # below and kotlin.native.enableKlibsCrossCompilation, it cross-compiles the linuxX64 and
    # mingwX64 klibs alongside the native Apple targets, so one deployment carries all of them.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch libpcap headers
        uses: ./.github/actions/libpcap-headers

      - name: Fetch Npcap SDK
        run: |
          curl -sSL https://npcap.com/dist/npcap-sdk-1.16.zip -o "$RUNNER_TEMP/npcap-sdk.zip"
          mkdir -p src/nativeInterop/npcap-sdk
          unzip -q "$RUNNER_TEMP/npcap-sdk.zip" -d src/nativeInterop/npcap-sdk

      - uses: jokelbaf/kotlin-release@master
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg_password: ${{ secrets.GPG_PASSWORD }}
          maven_username: ${{ secrets.MAVEN_USERNAME }}
          maven_password: ${{ secrets.MAVEN_PASSWORD }}
          java_version: 25
